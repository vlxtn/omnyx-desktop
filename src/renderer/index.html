<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Omnyx</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body {
        background: transparent;
        overflow: hidden;
        font-family: -apple-system, BlinkMacSystemFont, 'Inter', 'Segoe UI', sans-serif;
        -webkit-font-smoothing: antialiased;
      }
      .drag { -webkit-app-region: drag; }
      .no-drag { -webkit-app-region: no-drag; }

      @keyframes fadeInScale {
        from { opacity: 0; transform: scale(0.88) translateY(20px); filter: blur(6px); }
        to   { opacity: 1; transform: scale(1) translateY(0); filter: blur(0); }
      }
      @keyframes msgInUser {
        from { opacity: 0; transform: translateX(12px) scale(0.96); }
        to   { opacity: 1; transform: translateX(0) scale(1); }
      }
      @keyframes msgInAI {
        from { opacity: 0; transform: translateX(-12px) scale(0.96); }
        to   { opacity: 1; transform: translateX(0) scale(1); }
      }
      @keyframes slideDown {
        from { opacity: 0; transform: translateY(-10px); }
        to   { opacity: 1; transform: translateY(0); }
      }
      @keyframes slideUp {
        from { opacity: 0; transform: translateY(10px); }
        to   { opacity: 1; transform: translateY(0); }
      }
      @keyframes spin {
        to { transform: rotate(360deg); }
      }
      @keyframes blink {
        0%, 100% { opacity: 1; }
        50% { opacity: 0; }
      }
      @keyframes shimmer {
        0%   { background-position: -200% center; }
        100% { background-position:  200% center; }
      }
      @keyframes dotBounce {
        0%, 80%, 100% { transform: translateY(0) scale(0.7); opacity: 0.35; }
        40%           { transform: translateY(-5px) scale(1); opacity: 1; }
      }
      @keyframes inputGlow {
        0%, 100% { box-shadow: 0 0 0 2px rgba(99,102,241,0.35), 0 0 12px rgba(99,102,241,0.12); }
        50%       { box-shadow: 0 0 0 2px rgba(139,92,246,0.45), 0 0 20px rgba(139,92,246,0.18); }
      }
      @keyframes logoPulse {
        0%, 100% { box-shadow: 0 0 12px rgba(99,102,241,0.5), 0 0 24px rgba(99,102,241,0.2); }
        50%       { box-shadow: 0 0 20px rgba(139,92,246,0.7), 0 0 40px rgba(139,92,246,0.3); }
      }
      @keyframes panelIn {
        from { opacity: 0; transform: translateY(-6px); }
        to   { opacity: 1; transform: translateY(0); }
      }

      .ao-window { animation: fadeInScale 0.3s cubic-bezier(0.16, 1, 0.3, 1) both; }
      .ao-msg-user { animation: msgInUser 0.2s cubic-bezier(0.16, 1, 0.3, 1) both; }
      .ao-msg-ai   { animation: msgInAI  0.2s cubic-bezier(0.16, 1, 0.3, 1) both; }
      .ao-msg      { animation: slideUp  0.18s ease both; }
      .ao-panel    { animation: panelIn  0.18s cubic-bezier(0.16, 1, 0.3, 1) both; }

      /* Typing dots */
      .ao-typing-dots { display: inline-flex; align-items: center; gap: 4px; padding: 6px 4px; }
      .ao-typing-dots span {
        display: inline-block;
        width: 6px; height: 6px;
        border-radius: 50%;
        background: #818cf8;
        animation: dotBounce 1.2s ease-in-out infinite;
      }
      .ao-typing-dots span:nth-child(2) { animation-delay: 0.15s; }
      .ao-typing-dots span:nth-child(3) { animation-delay: 0.30s; }

      .ao-cursor::after {
        content: '▋';
        display: inline-block;
        animation: blink 0.65s step-end infinite;
        margin-left: 2px;
        color: #818cf8;
        font-size: 0.9em;
      }

      .ao-logo-text {
        background: linear-gradient(90deg, #a5b4fc, #c4b5fd, #a5b4fc);
        background-size: 200% auto;
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        animation: shimmer 3s linear infinite;
        font-weight: 700;
        letter-spacing: -0.5px;
      }

      .ao-quick-btn { transition: all 0.2s cubic-bezier(0.16, 1, 0.3, 1); }
      .ao-quick-btn:hover {
        background: rgba(99,102,241,0.14) !important;
        border-color: rgba(99,102,241,0.45) !important;
        transform: translateY(-2px) scale(1.03);
        box-shadow: 0 4px 16px rgba(99,102,241,0.15);
      }
      .ao-quick-btn:active { transform: translateY(0) scale(0.97); }

      .ao-suggestion:hover { background: rgba(99,102,241,0.15) !important; }
      .ao-btn { transition: opacity 0.15s, transform 0.15s; }
      .ao-btn:hover { opacity: 1 !important; transform: scale(1.12); }

      .ao-action-btn {
        transition: all 0.15s ease;
      }
      .ao-action-btn:hover {
        transform: translateY(-1px);
        box-shadow: 0 4px 12px rgba(99,102,241,0.2) !important;
      }

      input:focus, textarea:focus {
        animation: inputGlow 2s ease-in-out infinite;
        border-color: rgba(99,102,241,0.6) !important;
        transition: border-color 0.2s ease;
      }

      ::-webkit-scrollbar { width: 3px; }
      ::-webkit-scrollbar-track { background: transparent; }
      ::-webkit-scrollbar-thumb { background: rgba(99,102,241,0.2); border-radius: 3px; transition: background 0.2s; }
      ::-webkit-scrollbar-thumb:hover { background: rgba(99,102,241,0.45); }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
