<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Omnyx</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body {
        background: transparent;
        overflow: hidden;
        font-family: -apple-system, BlinkMacSystemFont, 'Inter', 'Segoe UI', sans-serif;
        -webkit-font-smoothing: antialiased;
      }
      .drag { -webkit-app-region: drag; }
      .no-drag { -webkit-app-region: no-drag; }

      @keyframes fadeInScale {
        from { opacity: 0; transform: scale(0.92) translateY(16px); filter: blur(4px); }
        to   { opacity: 1; transform: scale(1) translateY(0); filter: blur(0); }
      }
      @keyframes slideUp {
        from { opacity: 0; transform: translateY(10px); }
        to   { opacity: 1; transform: translateY(0); }
      }
      @keyframes slideDown {
        from { opacity: 0; transform: translateY(-8px); }
        to   { opacity: 1; transform: translateY(0); }
      }
      @keyframes spin {
        to { transform: rotate(360deg); }
      }
      @keyframes blink {
        0%, 100% { opacity: 1; }
        50% { opacity: 0; }
      }
      @keyframes shimmer {
        0%   { background-position: -200% center; }
        100% { background-position:  200% center; }
      }
      @keyframes borderPulse {
        0%, 100% { box-shadow: 0 0 0 1px rgba(99,102,241,0.3), 0 40px 120px rgba(0,0,0,0.8); }
        50%       { box-shadow: 0 0 0 1px rgba(139,92,246,0.5), 0 40px 120px rgba(0,0,0,0.8); }
      }
      @keyframes logoPulse {
        0%, 100% { box-shadow: 0 0 12px rgba(99,102,241,0.5), 0 0 24px rgba(99,102,241,0.2); }
        50%       { box-shadow: 0 0 20px rgba(139,92,246,0.7), 0 0 40px rgba(139,92,246,0.3); }
      }

      .ao-window { animation: fadeInScale 0.25s cubic-bezier(0.16, 1, 0.3, 1) both; }
      .ao-msg    { animation: slideUp 0.18s ease both; }
      .ao-panel  { animation: slideDown 0.16s ease both; }

      .ao-cursor::after {
        content: '▋';
        display: inline-block;
        animation: blink 0.65s step-end infinite;
        margin-left: 2px;
        color: #818cf8;
        font-size: 0.9em;
      }

      .ao-logo-text {
        background: linear-gradient(90deg, #a5b4fc, #c4b5fd, #a5b4fc);
        background-size: 200% auto;
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        animation: shimmer 3s linear infinite;
        font-weight: 700;
        letter-spacing: -0.5px;
      }

      .ao-quick-btn { transition: all 0.18s ease; }
      .ao-quick-btn:hover {
        background: rgba(99,102,241,0.1) !important;
        border-color: rgba(99,102,241,0.4) !important;
        transform: translateY(-1px);
      }
      .ao-suggestion:hover { background: rgba(99,102,241,0.15) !important; }
      .ao-btn { transition: opacity 0.15s, transform 0.15s; }
      .ao-btn:hover { opacity: 1 !important; transform: scale(1.1); }

      input:focus, textarea:focus {
        box-shadow: 0 0 0 2px rgba(99,102,241,0.4) !important;
        border-color: rgba(99,102,241,0.6) !important;
        transition: all 0.2s ease;
      }

      ::-webkit-scrollbar { width: 3px; }
      ::-webkit-scrollbar-track { background: transparent; }
      ::-webkit-scrollbar-thumb { background: rgba(99,102,241,0.25); border-radius: 3px; }
      ::-webkit-scrollbar-thumb:hover { background: rgba(99,102,241,0.45); }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
